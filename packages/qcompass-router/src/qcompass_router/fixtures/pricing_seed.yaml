# Static pricing seed for the qcompass-router (PROMPT 6A).
#
# Numbers are anchored to publicly listed provider pages at the
# time of writing; PROMPT 6B replaces this static seed with live
# fetchers + cache. Treat every value as a planning estimate, NOT
# a billing source of truth.
#
# Schema:
#   providers:
#     <key>:
#       provider:        canonical adapter name (matches
#                        ProviderAdapter.name)
#       backend:         specific backend label (matches
#                        BackendInfo.name)
#       per_second_usd:  dollars per second of QPU time
#       per_task_usd:    fixed dollars per submitted task
#       per_shot_usd:    dollars per shot (most cloud QPUs)
#       per_credit_usd:  for credit-based providers
#       free_minutes_per_month:  free-tier monthly allowance
#       free_credits_per_month:  ditto for credit-based providers
#       fidelity_estimate:       static 2Q fidelity floor (0..1)
#       queue_time_s_estimate:   typical queue time in seconds

providers:
