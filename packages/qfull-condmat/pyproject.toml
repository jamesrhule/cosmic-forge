# qfull-condmat: condensed-matter domain plugin for QCompass.
#
# Implements the qcompass_core.Simulation protocol for Hubbard /
# Heisenberg / frustrated-spin / OTOC workloads. Backends span IBM
# Heron (digital) and QuEra Aquila (analog); classical references use
# quimb / tenpy / netket (each lazy-imported).
#
# Boundary: MUST NOT import from `ucgle_f1` or any other `qfull_*`
# sibling. CI enforces with grep + tests/test_boundary.py.

[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "qfull-condmat"
version = "0.1.0"
description = "QFull-CondMat — condensed-matter many-body domain plugin for QCompass."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "QCompass authors" }]
dependencies = [
  "pydantic>=2.12",
  "numpy>=1.26",
  "scipy>=1.14",
  "h5py>=3.12",
  "pyyaml>=6",
  "qcompass-core>=0.1,<0.2",
]

[project.optional-dependencies]
classical = [
  "quimb[tensor]>=1.13",
  "physics-tenpy>=1.0",
  "netket>=3.21",
]
ibm = [
  "qiskit>=2.2,<3",
  "qiskit-aer>=0.17",
  "qiskit-ibm-runtime",
]
analog = [
  "bloqade-analog>=0.15",
]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.24",
  "pytest-regressions>=2.5",
  "hypothesis>=6.120",
  "mypy>=1.13",
  "ruff>=0.8",
]

[project.entry-points."qcompass.domains"]
condmat = "qfull_cm.sim:CondMatSimulation"

[tool.hatch.build.targets.wheel]
packages = ["src/qfull_cm"]

[tool.hatch.build.targets.wheel.force-include]
"src/qfull_cm/instances" = "qfull_cm/instances"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
python_version = "3.12"
strict = true
mypy_path = "src"
namespace_packages = true
explicit_package_bases = true
plugins = ["pydantic.mypy"]
disallow_untyped_defs = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = [
  "quimb.*", "tenpy.*", "physics_tenpy.*", "netket.*",
  "qiskit.*", "qiskit_aer.*", "qiskit_ibm_runtime.*",
  "bloqade.*", "bloqade_analog.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests", "src/qfull_cm/audit"]
asyncio_mode = "auto"
markers = [
  "slow: long-running test",
  "s_audit: per-domain S-cm-* audit",
  "needs_quimb: requires quimb",
  "needs_tenpy: requires tenpy",
  "needs_netket: requires netket",
  "needs_qiskit: requires qiskit",
  "needs_bloqade_analog: requires bloqade-analog",
]
