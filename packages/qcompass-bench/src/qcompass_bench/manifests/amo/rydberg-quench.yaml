  shots: 1
  seed: 0
  rydberg_ground_state:
    L: 8
    blockade_radius: 1.0
    detuning: 0.5
    rabi: 1.0
    geometry: chain
budget:
  metric: energy_per_atom
  target: 0.0
  tolerance: 5.0
  relative: false
  notes: Per-atom energy must lie within ±5.0 (wide physical band).
