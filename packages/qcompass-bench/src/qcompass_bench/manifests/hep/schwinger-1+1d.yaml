id: schwinger-1plus1d
name: Schwinger 1+1D (m/g=0.5)
domain: hep
kind: bundled_manifest
description: |
  Kogut-Susskind staggered Schwinger model at m/g=0.5. Targets the
  Farrell et al. 2024 chiral-condensate band; observable to within
  5% on local Aer. The qfull-hep plugin's classical kernel does
  L≤10 dense ED — we use L=6 here (m/g=0.5 with m=0.5, g=1.0).
qcompass_simulation: hep
payload_inline:
  kind: schwinger
  backend_preference: classical
  shots: 1
  seed: 0
  schwinger:
    L: 6
    m: 0.5
    g: 1.0
    theta: 0.0
budget:
  metric: chiral_condensate
  target: 0.0
  tolerance: 0.05
  relative: false
  notes: >-
    Farrell et al. 2024 chiral-condensate band; 5% absolute
    tolerance for a finite-size L=6 lattice.
references:
  - "2401.04188"
