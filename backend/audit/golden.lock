# UCGLE-F1 freeze gate (canonical PROMPT 0 v2).
#
# v1 of this lock hashed the entire `backend/audit/` tree. v2 of
# the canonical PROMPT 0 explicitly fingerprints
# `backend/audit/physics/` instead — the per-physics test surface
# that S1–S15 owns. The agent audit suite under
# `backend/audit/agent/` is separately validated by the A1–A6
# tests and is intentionally NOT part of the physics freeze
# fingerprint.
#
# Conflict log (PROMPT 0 v2 §STEP A.3):
#   - The on-disk v1 lock recorded
#       audit_dir_hash: 4f3d61b3...384ea1   (target: backend/audit/)
#   - PROMPT 0 v2 mandates
#       dirhash backend/audit/physics > backend/audit/golden.lock
#   - Per the v2 conflict-resolution rule, the prompt wins; the
#     v1 hash is preserved below as `audit_dir_hash_v1` for
#     archaeology only and is no longer enforced by CI.
#
# .github/workflows/ucglef1-drift-alarm.yml recomputes the
# `physics_dir_hash` on every PR. Mutating this file requires the
# `physics-reviewed` PR label.

