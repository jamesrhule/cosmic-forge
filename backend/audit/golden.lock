# UCGLE-F1 freeze gate (PROMPT 0, tag ucglef1-v1.0.0).
#
# This file pins the exact byte-content of every test under
# backend/audit/ at the moment the freeze was sealed. The
# .github/workflows/ucglef1-drift-alarm.yml workflow recomputes the
# hash on every PR; mismatches block the merge.
#
# Spec note: PROMPT 0 §4 asked for `dirhash backend/audit/physics/golden/`,
# but that subdirectory was never populated (it is reserved for the
# Phase 7 golden-image regression suite). We instead hash the entire
# backend/audit/ directory, which is the *real* freeze surface — the
# S1–S15 + A1–A6 test files and the conftest fixtures. The path
# `backend/audit/physics/golden/` remains reserved for future use; if
# it is created later, this file gains a second hash entry rather
# than replacing the existing one.
#
# To intentionally update this file, the PR MUST carry the
# `physics-reviewed` label. The drift-alarm workflow refuses
# unlabelled changes.

algorithm: sha256
ignore:
  - "*.pyc"
  - "__pycache__"
  - ".pytest_cache"
  - "golden.lock"

# Hash of `backend/audit/` (the live test surface).
audit_dir_hash: 4f3d61b3542edc37219cd4346ad94f55f5e6c63c628c4de89b737aa2f2384ea1

# Hash of `backend/audit/physics/golden/` (reserved; computed once
# Phase 7 ships its golden-image fixtures).
golden_dir_hash: null

baseline_pytest:
  selection: "backend/audit -q -m 'not slow'"
  result: "50 passed, 1 deselected"
  recorded_at: "2026-04-25"

semver: "1.0.0"
ucglef1_freeze_commit: "ucglef1-v1.0.0"
